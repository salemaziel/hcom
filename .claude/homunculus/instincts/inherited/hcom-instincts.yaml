# Hcom Workflow Codex Hook Trust State Management

## Action

Follow the codex-hook-trust-state-management workflow:
1. Update src/hooks/codex.rs to adjust trust logic or cleanup deprecated keys.
2. Modify src/tools/codex_preprocessing.rs to handle trust bypass or preprocessing changes.
3. Optionally update src/commands/hooks.rs or src/commands/status.rs to align CLI commands with trust state changes.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/hooks/codex.rs, src/tools/codex_preprocessing.rs, src/commands/hooks.rs

