name: Publish PyPI

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      PLAN: ${{ inputs.plan }}
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: List wheels
        run: ls -la dist/

      - name: Separate Android wheel
        run: |
          mkdir -p android-dist
          mv dist/*-linux_aarch64.whl android-dist/ || true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Attach Android wheel to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="$(printf '%s' "$PLAN" | jq -r '.announcement_tag')"
          gh release upload "$TAG" -R salemaziel/hcom android-dist/*.whl --clobber
